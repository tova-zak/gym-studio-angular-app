<div class="login-wrapper">
  <div class="login-container">
    <!-- Header with Logo -->
    <div class="login-header">
      <div class="logo-section">
        <div class="logo-mark">
          <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="30" r="15" fill="currentColor"/>
            <path d="M 50 50 L 40 70 L 45 70 L 45 85 L 55 85 L 55 70 L 60 70 Z" fill="currentColor"/>
            <path d="M 30 55 L 20 75 L 25 75 L 35 55 Z" fill="currentColor"/>
            <path d="M 70 55 L 65 75 L 75 75 L 80 55 Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">Step Forward</div>
          <div class="brand-sub">מכון סטודיו להתעמלות</div>
        </div>
      </div>
      <p class="tagline">Welcome</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- background icons (decorative) -->
      <div class="bg-icon bg-anim-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <div class="bg-icon bg-anim-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-2-2h-1"></path><path d="M3 8v8a2 2 0 0 0 2 2h1"></path><rect x="6" y="2" width="12" height="6" rx="3"></rect></svg>
      </div>
      <div class="bg-icon bg-anim-3">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </div>
      <div class="bg-icon bg-anim-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><path d="M12 11a4 4 0 0 0 0-8"></path></svg>
      </div>
      <div class="bg-icon small bg-anim-5">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </div>
      <div class="bg-icon tiny bg-anim-6">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13V7a2 2 0 0 0-2-2H6"></path><path d="M6 21v-6a2 2 0 0 1 2-2h8"></path></svg>
      </div>
      <div class="bg-icon small bg-anim-7">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="15" r="4"></circle><path d="M9 11V7"></path><path d="M15 7h2a2 2 0 0 1 2 2v2"></path></svg>
      </div>
      <div class="bg-icon tiny bg-anim-8">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M16 8l-8 8"></path></svg>
      </div>

      <!-- gym-specific decorative icons -->
      <div class="bg-icon tiny bg-anim-1" style="top:8%; left:24%; opacity:0.18;">
        <!-- dumbbell -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="7" width="4" height="10" rx="1"/><rect x="19" y="7" width="4" height="10" rx="1"/><rect x="6.5" y="10.5" width="11" height="3" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-2" style="top:22%; left:60%; opacity:0.18;">
        <!-- treadmill -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="12" width="16" height="4" rx="1"/><path d="M20 12v-2a2 2 0 0 0-2-2h-1"/></svg>
      </div>
      <div class="bg-icon small bg-anim-3" style="top:40%; left:6%; opacity:0.16;">
        <!-- exercise bike -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="7" cy="17" r="3"/><circle cx="17" cy="17" r="3"/><path d="M7 17h6l2-5"/><path d="M12 7v3"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-4" style="top:62%; left:72%; opacity:0.16;">
        <!-- track lane icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="6" width="20" height="4" rx="1"/><rect x="2" y="14" width="20" height="4" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-5" style="top:78%; left:28%; opacity:0.16;">
        <!-- kettlebell -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M8 10a4 4 0 1 1 8 0v3a6 6 0 1 1-8 0z"/></svg>
      </div>

      <!-- additional dumbbells for dense background -->
      <div class="bg-icon tiny bg-anim-6" style="top:6%; left:40%; opacity:0.22;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-7" style="top:14%; left:12%; opacity:0.20;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-8" style="top:24%; left:84%; opacity:0.20;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-5" style="top:36%; left:52%; opacity:0.20;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-6" style="top:50%; left:24%; opacity:0.18;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-7" style="top:58%; left:68%; opacity:0.20;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-8" style="top:70%; left:10%; opacity:0.18;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-1" style="top:82%; left:76%; opacity:0.18;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-2" style="top:44%; left:86%; opacity:0.16;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      <div class="bg-icon tiny bg-anim-3" style="top:12%; left:76%; opacity:0.18;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="19" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx="1"/></svg>
      </div>
      
      <!-- User Type Selector -->
      <div class="user-type-selector">
        <div 
          class="user-type-option" 
          [class.highlighted]="isHighlighted && userType === 'teacher'">
          <svg class="option-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" fill="currentColor"/>
            <path d="M 12 13 C 8 13 5 15 5 18 L 5 22 L 19 22 L 19 18 C 19 15 16 13 12 13 Z" fill="currentColor"/>
          </svg>
          <span>מורה להתעמלות</span>
        </div>

        <div 
          class="user-type-option" 
          [class.highlighted]="isHighlighted && userType === 'registrar'">
          <svg class="option-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M 4 3 L 4 21 L 20 21 L 20 3 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 8 7 L 16 7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 8 11 L 16 11" stroke="currentColor" stroke-width="1.5"/>
            <path d="M 8 15 L 16 15" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span>מזכירת רישום</span>
        </div>
      </div>

      <!-- Username Field -->
      <div class="form-group">
        <label for="username" class="form-label">
          <svg class="field-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" fill="currentColor"/>
            <path d="M 12 13 C 8 13 5 15 5 18 L 5 22 L 19 22 L 19 18 C 19 15 16 13 12 13 Z" fill="currentColor"/>
          </svg>
          <span>שם משתמש</span>
        </label>
        <input 
          id="username"
          formControlName="username" 
          type="text"
          class="form-input"
          placeholder="הכנס שם משתמש">
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">
          <svg class="field-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="11" width="14" height="10" fill="none" stroke="currentColor" stroke-width="1.5" rx="2"/>
            <path d="M 9 11 L 9 7 C 9 5 10 4 12 4 C 14 4 15 5 15 7 L 15 11" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
          </svg>
          <span>סיסמה</span>
        </label>
        <input 
          id="password"
          formControlName="password" 
          type="password"
          class="form-input"
          placeholder="הכנס סיסמה">
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage.length > 0" class="error-message">
        <svg class="error-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="16" r="1" fill="currentColor"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="!loginForm.valid"
        class="submit-button">
        <svg class="button-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M 5 12 L 10 17 L 19 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        כניסה
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="footer-text">© 2026 Step Forward - כל הזכויות שמורות</p>
    </div>
  </div>
</div>
