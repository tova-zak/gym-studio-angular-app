<div class="custom-header" (click)="$event.stopPropagation()">
  <div class="header-row">
    <span class="header-label">{{ params.displayName }}</span>
    <button
      type="button"
      class="filter-button"
      [title]="'סנן לפי ' + (params.columnName || params.displayName)"
      (click)="toggleFilter($event)"
    >
      🔍
    </button>
  </div>

  <div class="filter-box" *ngIf="showFilter">
    <ng-container *ngIf="params.filterType !== 'boolean'">
      <input
        [type]="params.filterType === 'number' ? 'number' : 'text'"
        [placeholder]="'סנן לפי ' + (params.columnName || params.displayName)"
        [value]="inputValue"
        (input)="onInputChange($any($event.target).value)"
      />
    </ng-container>

    <ng-container *ngIf="params.filterType === 'boolean'">
      <select [value]="inputValue" (change)="onSelectChange($any($event.target).value)">
        <option value="">הכל</option>
        <option value="true">שולם</option>
        <option value="false">לא שולם</option>
      </select>
    </ng-container>
  </div>
</div>
