<article class="lesson-card" [class.started]="isStarted()">
	<h3>{{ lesson.name }}</h3>
	<p><strong>Teacher:</strong> {{ lesson.teacherName || lesson.teacher }}</p>
	<p><strong>Sessions:</strong> {{ lesson.sessionsCount || lesson.sessions }}</p>
	<p><strong>When:</strong> {{ lesson.day }}, {{ lesson.time }}</p>
	<p><strong>Start:</strong> {{ lesson.startDate | date:'mediumDate' }}</p>
	<p><strong>Price:</strong> {{ lesson.price }}₪</p>
</article>
